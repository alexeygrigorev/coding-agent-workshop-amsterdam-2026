<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake Game</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f172a;
      --panel: #111827;
      --grid: #1f2937;
      --snake: #22c55e;
      --snake-head: #16a34a;
      --food: #ef4444;
      --text: #e5e7eb;
      --muted: #94a3b8;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #1e293b, var(--bg));
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    .wrap {
      width: min(92vw, 560px);
      display: grid;
      gap: 12px;
      justify-items: center;
    }

    .hud {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background: rgba(17, 24, 39, 0.75);
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 14px;
      backdrop-filter: blur(6px);
    }

    .hud strong { color: white; }
    .hud .muted { color: var(--muted); font-size: 0.95rem; }

    canvas {
      width: min(92vw, 560px);
      height: min(92vw, 560px);
      max-width: 560px;
      max-height: 560px;
      background: rgba(17, 24, 39, 0.8);
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 18px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      image-rendering: pixelated;
      touch-action: none;
    }

    .footer {
      text-align: center;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.4;
    }

    .overlay {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      background: rgba(2, 6, 23, 0.65);
      padding: 20px;
    }

    .overlay.show { display: grid; }

    .card {
      width: min(92vw, 420px);
      background: rgba(15, 23, 42, 0.95);
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 18px;
      padding: 24px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
    }

    .card h1 {
      margin: 0 0 10px;
      font-size: 2rem;
    }

    .card p {
      margin: 0 0 18px;
      color: var(--muted);
    }

    button {
      appearance: none;
      border: 0;
      background: linear-gradient(180deg, #22c55e, #16a34a);
      color: white;
      font-weight: 700;
      padding: 12px 18px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 1rem;
    }

    button:hover { filter: brightness(1.05); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hud">
      <div>Score: <strong id="score">0</strong></div>
      <div class="muted">Use arrow keys or swipe</div>
    </div>
    <canvas id="game" width="560" height="560"></canvas>
    <div class="footer">Press Space to pause/resume. Press R to restart.</div>
  </div>

  <div class="overlay" id="overlay">
    <div class="card">
      <h1>Game Over</h1>
      <p>Your final score was <strong id="finalScore">0</strong>.</p>
      <button id="restartBtn">Play Again</button>
    </div>
  </div>

  <script>
    (() => {
      const canvas = document.getElementById('game');
      const ctx = canvas.getContext('2d');
      const scoreEl = document.getElementById('score');
      const overlay = document.getElementById('overlay');
      const finalScoreEl = document.getElementById('finalScore');
      const restartBtn = document.getElementById('restartBtn');

      const size = 28;
      const tile = canvas.width / size;
      const tickMs = 110;

      let snake, dir, nextDir, food, score, running, gameOver, timer;
      let touchStartX = 0;
      let touchStartY = 0;

      function reset() {
        snake = [{ x: 14, y: 14 }];
        dir = { x: 1, y: 0 };
        nextDir = { x: 1, y: 0 };
        score = 0;
        running = true;
        gameOver = false;
        overlay.classList.remove('show');
        scoreEl.textContent = score;
        spawnFood();
        clearInterval(timer);
        timer = setInterval(step, tickMs);
        draw();
      }

      function spawnFood() {
        do {
          food = {
            x: Math.floor(Math.random() * size),
            y: Math.floor(Math.random() * size),
          };
        } while (snake.some(seg => seg.x === food.x && seg.y === food.y));
      }

      function step() {
        if (!running || gameOver) return;
        dir = nextDir;
        const head = snake[0];
        const newHead = { x: head.x + dir.x, y: head.y + dir.y };

        if (
          newHead.x < 0 || newHead.x >= size ||
          newHead.y < 0 || newHead.y >= size ||
          snake.some(seg => seg.x === newHead.x && seg.y === newHead.y)
        ) {
          endGame();
          return;
        }

        snake.unshift(newHead);

        if (newHead.x === food.x && newHead.y === food.y) {
          score += 1;
          scoreEl.textContent = score;
          spawnFood();
        } else {
          snake.pop();
        }

        draw();
      }

      function drawGrid() {
        ctx.fillStyle = '#111827';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.strokeStyle = '#1f2937';
        ctx.lineWidth = 1;
        for (let i = 0; i <= size; i++) {
          const p = i * tile;
          ctx.beginPath();
          ctx.moveTo(p, 0);
          ctx.lineTo(p, canvas.height);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(0, p);
          ctx.lineTo(canvas.width, p);
          ctx.stroke();
        }
      }

      function drawCell(x, y, color, inset = 2) {
        ctx.fillStyle = color;
        ctx.fillRect(x * tile + inset, y * tile + inset, tile - inset * 2, tile - inset * 2);
      }

      function draw() {
        drawGrid();
        drawCell(food.x, food.y, '#ef4444', 4);

        snake.forEach((seg, i) => {
          drawCell(seg.x, seg.y, i === 0 ? '#16a34a' : '#22c55e');
        });
      }

      function endGame() {
        gameOver = true;
        running = false;
        clearInterval(timer);
        finalScoreEl.textContent = score;
        overlay.classList.add('show');
      }

      function setDirection(x, y) {
        if (gameOver) return;
        if (x === -dir.x && y === -dir.y) return;
        nextDir = { x, y };
      }

      document.addEventListener('keydown', (e) => {
        const key = e.key;
        if (key === 'ArrowUp') setDirection(0, -1);
        else if (key === 'ArrowDown') setDirection(0, 1);
        else if (key === 'ArrowLeft') setDirection(-1, 0);
        else if (key === 'ArrowRight') setDirection(1, 0);
        else if (key === ' ') {
          if (!gameOver) running = !running;
        } else if (key.toLowerCase() === 'r') {
          reset();
        }
      });

      canvas.addEventListener('touchstart', (e) => {
        const t = e.changedTouches[0];
        touchStartX = t.clientX;
        touchStartY = t.clientY;
      }, { passive: true });

      canvas.addEventListener('touchend', (e) => {
        const t = e.changedTouches[0];
        const dx = t.clientX - touchStartX;
        const dy = t.clientY - touchStartY;
        if (Math.max(Math.abs(dx), Math.abs(dy)) < 20) return;
        if (Math.abs(dx) > Math.abs(dy)) setDirection(dx > 0 ? 1 : -1, 0);
        else setDirection(0, dy > 0 ? 1 : -1);
      }, { passive: true });

      restartBtn.addEventListener('click', reset);

      reset();
    })();
  </script>
</body>
</html>
